name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  # ── SAST: tfsec security scan ─────────────────────────────────────────────
  sast:
    name: SAST — tfsec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Image Scan: Trivy on Dockerfiles / published images ───────────────────
  image-scan:
    name: Image Scan — Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload SARIF to GitHub Security tab
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo scan)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true   # non-blocking if Advanced Security not enabled
        with:
          sarif_file: trivy-results.sarif

  # ── Lint & Validate ──────────────────────────────────────────────────────────
  validate:
    name: Validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: [sast, image-scan]
    strategy:
      matrix:
        env: [dev, test, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive .
        continue-on-error: true  # warn on style drift without blocking validate

      - name: Terraform Init
        run: terraform -chdir=envs/${{ matrix.env }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=envs/${{ matrix.env }} validate

  # ── Plan (PR only) ───────────────────────────────────────────────────────────
  plan:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - env: dev
            kv_secret: SECRETS_KV_NAME_DEV
          - env: test
            kv_secret: SECRETS_KV_NAME_TEST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}

      - name: Get secrets from Key Vault
        uses: azure/get-keyvault-secrets@v1
        id: kv-secrets
        with:
          keyvault: ${{ secrets[matrix.kv_secret] }}
          secrets: "sql-admin-password"

      - name: Terraform Init
        run: terraform -chdir=envs/${{ matrix.env }} init
        env:
          TF_VAR_sql_admin_password: ${{ steps.kv-secrets.outputs.sql-admin-password }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=envs/${{ matrix.env }} plan \
            -var-file=terraform.tfvars \
            -no-color \
            -out=terraform.tfplan
        env:
          TF_VAR_sql_admin_password: ${{ steps.kv-secrets.outputs.sql-admin-password }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `#### Terraform Plan 📖 — \`${{ matrix.env }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ── Deploy Dev (push to develop) ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}

      - name: Get secrets from Key Vault (dev)
        uses: azure/get-keyvault-secrets@v1
        id: kv-secrets
        with:
          keyvault: ${{ secrets.SECRETS_KV_NAME_DEV }}
          secrets: "sql-admin-password"

      - name: Terraform Init
        run: terraform -chdir=envs/dev init

      - name: Terraform Apply
        run: |
          terraform -chdir=envs/dev apply \
            -var-file=terraform.tfvars \
            -auto-approve
        env:
          TF_VAR_sql_admin_password: ${{ steps.kv-secrets.outputs.sql-admin-password }}

      ## After infra deploy, build and push images to ACR with Trivy scan
      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER_DEV }}
          username: ${{ secrets.ARM_CLIENT_ID }}
          password: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Build & Scan app image (dev)
        if: hashFiles('**/Dockerfile') != ''
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER_DEV }}/app:${{ github.sha }} .
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ${{ secrets.ACR_LOGIN_SERVER_DEV }}/app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER_DEV }}/app:${{ github.sha }}

  # ── Deploy Prod (push to main, manual approval required) ─────────────────────
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod   # requires manual approval via GitHub environment protection rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}

      - name: Get secrets from Key Vault (prod)
        uses: azure/get-keyvault-secrets@v1
        id: kv-secrets
        with:
          keyvault: ${{ secrets.SECRETS_KV_NAME_PROD }}
          secrets: "sql-admin-password"

      - name: Terraform Init
        run: terraform -chdir=envs/prod init

      - name: Terraform Plan
        run: |
          terraform -chdir=envs/prod plan \
            -var-file=terraform.tfvars \
            -no-color
        env:
          TF_VAR_sql_admin_password: ${{ steps.kv-secrets.outputs.sql-admin-password }}

      - name: Terraform Apply
        run: |
          terraform -chdir=envs/prod apply \
            -var-file=terraform.tfvars \
            -auto-approve
        env:
          TF_VAR_sql_admin_password: ${{ steps.kv-secrets.outputs.sql-admin-password }}

      ## After infra deploy, build and push images to ACR with Trivy scan
      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER_PROD }}
          username: ${{ secrets.ARM_CLIENT_ID }}
          password: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Build & Scan app image (prod)
        if: hashFiles('**/Dockerfile') != ''
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER_PROD }}/app:${{ github.sha }} .
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ${{ secrets.ACR_LOGIN_SERVER_PROD }}/app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER_PROD }}/app:${{ github.sha }}
